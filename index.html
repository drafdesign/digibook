<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRAF. // DIGIBOOK</title>
    <style>
        :root {
            --ink: #0F0F0D;
            --bone: #F5F2EB;
            --fired: #F06D06;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--ink);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* STABLE IPAD CONTAINER */
        .digibook-frame {
            width: 100%;
            max-width: 1024px;
            min-height: 90vh;
            background-color: var(--bone);
            border: 1px solid var(--ink);
            position: relative;
            padding: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* THE LIGHT GRID */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(var(--ink) 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            opacity: 0.05;
            pointer-events: none;
        }

        /* ASYMMETRIC BRANDING */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid var(--ink);
            padding-bottom: 10px;
            margin-bottom: 50px;
        }

        .brand { 
            font-weight: 900; 
            font-size: 24px; 
            letter-spacing: -1px;
            color: var(--ink);
        }
        
        .brand span { color: var(--fired); } /* The Fired Mark */

        .meta { 
            font-size: 10px; 
            text-transform: uppercase; 
            text-align: right;
            color: rgba(15, 15, 13, 0.4); /* Economy of Means / Transparent */
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px dashed rgba(0,0,0,0.1);
        }

        .status-box {
            text-align: center;
        }

        .status-tag {
            background: var(--ink);
            color: var(--bone);
            padding: 8px 15px;
            font-size: 11px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .footer {
            margin-top: 50px;
            border-top: 1px solid var(--ink);
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: var(--ink);
        }
    </style>
</head>
<body>

<div class="digibook-frame">
    <div class="grid-bg"></div>
    
    <div class="header">
        <div class="brand">DRAF<span>.</span></div>
        <div class="meta">
            INTERNAL_PROJECT: [VOLE]<br>
            REVISION: RECLINED_STABLE_V1
        </div>
    </div>

    <div class="content-area">
        <div class="status-box">
            <div class="status-tag">SYSTEM_REVIVAL // IN_PROGRESS</div>
            <p style="letter-spacing: 3px; font-size: 12px;">AUTOPSY COMPLETE. AWAITING TRANSPLANT.</p>
        </div>
    </div>

    <div class="footer">
        <div>SHANE SMILEY // PRINCIPAL</div>
        <div>//| DRAF. STUDIO 2026.03.21</div>
        <div>STABLE_VIEWPORT_V1</div>
    </div>
</div>

</body>
</html>
