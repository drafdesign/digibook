<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DRAF. // VOLE.</title>
    <style>
        :root {
            --ink: #0F0F0D;
            --bone: #F5F2EB;
            --fired: #D4500A;
        }

        /* VOLE. SURFACE INTEGRITY: DE-BROWSERFICATION */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--ink);
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; touch-action: none;
        }

        .digibook-frame {
            width: 100vw; height: 94vh; max-width: 1024px;
            background-color: var(--bone); border: 1px solid var(--ink);
            position: relative; padding: 40px; display: flex; flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* LAYER 1: THE DOT GRID */
        .grid-bg {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(var(--ink) 0.5px, transparent 0.5px);
            background-size: 15.1px 15.1px; 
            opacity: 0.08; pointer-events: none; z-index: 1;
        }

        /* LAYER 2: THE INK ENGINE (REPAIRED) */
        #ink-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20; touch-action: none;
        }

        .header, .footer { position: relative; z-index: 30; color: var(--ink); pointer-events: none; }
        
        .header {
            display: flex; justify-content: space-between; align-items: baseline;
            border-bottom: 1.5px solid var(--ink); padding-bottom: 10px; margin-bottom: 50px;
        }

        .brand { font-weight: 900; font-size: 24px; letter-spacing: -1.5px; }
        #fired-dot { color: var(--fired); display: inline-block; transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .meta { 
            font-size: 10px; text-transform: uppercase; text-align: right; 
            line-height: 1.4; color: rgba(15, 15, 13, 0.5); 
        }

        .footer {
            margin-top: auto; border-top: 1.5px solid var(--ink);
            padding-top: 15px; display: flex; justify-content: space-between;
            font-size: 9px; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="digibook-frame">
    <div class="grid-bg"></div>
    
    <svg id="ink-layer" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <rect id="hit-surface" width="100%" height="100%" fill="#FFFFFF" fill-opacity="0.01" pointer-events="all" />
    </svg>
    
    <div class="header">
        <div class="brand">DRAF<span id="fired-dot">.</span></div>
        <div class="meta">
            INTERNAL_PROJECT: [VOLE]<br>
            REVISION: RECLINED_STABLE_V1
        </div>
    </div>

    <div class="footer">
        <div>SHANE SMILEY // PRINCIPAL</div>
        <div>//| DRAF. STUDIO 2026.03.22</div>
        <div>STABLE_VIEWPORT_V1</div>
    </div>
</div>

<script>
    const svg = document.getElementById('ink-layer');
    const dot = document.getElementById('fired-dot');
    let isDrawing = false;
    let currentPath = null;
    
    const activeNib = 0.6; // Studio 01 Micron (Retina Adjusted)

    function setupDrawing() {
        const surface = document.getElementById('hit-surface');

        surface.addEventListener('pointerdown', (e) => {
            // Priority: Stylus (Pencil) > Mouse > Touch
            if (e.pointerType === 'stylus' || e.buttons === 1 || e.pointerType === 'touch') {
                isDrawing = true;
                
                // Visual Pulse Check: Studio Confirmation
                dot.style.transform = "scale(2.5)";
                setTimeout(() => { dot.style.transform = "scale(1)"; }, 150);

                const pt = getCoordinates(e);
                currentPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
                currentPath.setAttribute("d", `M ${pt.x} ${pt.y}`);
                currentPath.setAttribute("stroke", "var(--ink)");
                currentPath.setAttribute("stroke-width", activeNib);
                currentPath.setAttribute("fill", "none");
                currentPath.setAttribute("stroke-linecap", "round");
                currentPath.setAttribute("stroke-linejoin", "round");
                svg.appendChild(currentPath);
            }
        });

        surface.addEventListener('pointermove', (e) => {
            if (!isDrawing || !currentPath) return;
            const pt = getCoordinates(e);
            const d = currentPath.getAttribute("d");
            currentPath.setAttribute("d", `${d} L ${pt.x} ${pt.y}`);
        });

        window.addEventListener('pointerup', () => { isDrawing = false; currentPath = null; });
        window.addEventListener('pointercancel', () => { isDrawing = false; currentPath = null; });
    }

    function getCoordinates(e) {
        const rect = svg.getBoundingClientRect();
        return {
            x: e.clientX - rect.left,
            y: e.clientY - rect.top
        };
    }

    setupDrawing();
    console.log("VOLE. // Surface Grafted and Synchronized.");
</script>

</body>
</html>
