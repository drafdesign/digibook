<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VOLE // VOL_01</title>
    <style>
        :root {
            --bone: #F5F2EB;
            --ink:  #0F0F0D;
            --fired: #D4500A;
            --blueprint: #1A3A5C;
            --pink: #F48FB1;
            --gray: #D1CDC4;
            --gutter: 24px;
        }

        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        #cvs { touch-action: none; }

        #gate, .toc-module, .grid-cell, .menu-item,
        #privacy-toggle, #pal-trigger, .nib-slot-btn,
        .swatch, #eraser-mode-btn, #nav-burger,
        #nav-burger-top, #ribbon,
        .page-prev, .page-next { touch-action: manipulation; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bone);
            font-family: 'Courier New', monospace;
            color: var(--ink);
        }

        /* ─────────────────────────────────────────
           COVER
        ───────────────────────────────────────── */
        #gate {
            position: fixed; inset: 0; z-index: 5000;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        #gate svg {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
        }

        /* ─────────────────────────────────────────
           BRIDGE
        ───────────────────────────────────────── */
        #bridge {
            position: fixed; inset: 0; z-index: 6000;
            display: none;
            align-items: center; justify-content: center;
            background: var(--bone);
            font-size: 80px; font-weight: 900;
            letter-spacing: -2px;
        }

        /* ─────────────────────────────────────────
           TOC SPREAD
        ───────────────────────────────────────── */
        #toc-spread {
            position: fixed; inset: 0; z-index: 4000;
            display: none;
            grid-template-columns: 1fr 1fr;
            background: var(--bone);
        }
        .page-left {
            border-right: 1px solid rgba(15,15,13,0.15);
            display: flex; align-items: center; justify-content: center;
            padding: 60px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 22vw);
            grid-template-rows:    repeat(4, 22vw);
            gap: var(--gutter);
        }
        @media (max-height: 900px) {
            .grid-container {
                grid-template-columns: repeat(2, 20vw);
                grid-template-rows:    repeat(4, 20vw);
            }
        }
        .grid-cell {
            border: 1px solid var(--ink);
            display: flex; align-items: center; justify-content: center;
        }
        .grid-cell.sticky { background: #FFFDE7; }
        .mark { font-size: 28px; font-weight: 900; letter-spacing: -1px; }
        .page-right {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 80px 60px; overflow: hidden;
        }
        .toc-list { width: 100%; max-width: 400px; }
        .toc-module {
            padding: 20px 0;
            border-bottom: 1px solid var(--ink);
            cursor: pointer;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toc-module:first-child { border-top: 1px solid var(--ink); }
        .toc-module:hover .proj-title { text-decoration: underline; }
        .toc-row { display: flex; justify-content: space-between; align-items: baseline; }
        .pg-num      { font-size: 14px; font-weight: bold; }
        .proj-title  { font-size: 18px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .proj-status { font-size: 10px; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; }

        /* ─────────────────────────────────────────
           LAB
        ───────────────────────────────────────── */
        #lab {
            position: fixed; inset: 0; z-index: 1000;
            display: none; flex-direction: column;
        }

        #lab-nav {
            height: 48px; flex-shrink: 0;
            border-bottom: 1px solid var(--ink);
            background: var(--bone);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px;
            position: relative; z-index: 10;
        }
        .nav-draf { font-size: 14px; font-weight: 900; letter-spacing: 2px; }
        .nav-stamp {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-size: 10px; letter-spacing: 2px; color: var(--ink);
            opacity: 0.4;
        }
        #nav-burger-top { font-size: 20px; cursor: pointer; line-height: 1; }

        #page-area {
            flex-grow: 1; position: relative; overflow: hidden;
        }

        #dot-grid {
            position: absolute; inset: 0; z-index: 1; pointer-events: none;
            background-image: radial-gradient(var(--ink) 0.5px, transparent 0.5px);
            background-size: 15.1px 15.1px;
            opacity: 0.08;
        }

        #cvs {
            position: absolute; inset: 0; z-index: 2;
            display: block; width: 100%; height: 100%;
            cursor: crosshair;
        }

        /* ─────────────────────────────────────────
           TOOL DRAWER — opens upward from toolbar left
        ───────────────────────────────────────── */
        #tool-drawer {
            position: absolute;
            bottom: 0; left: 0;
            width: 228px;
            background: var(--bone);
            border: 1px solid var(--ink);
            border-bottom: none;
            z-index: 20;
            display: none;
            flex-direction: column;
        }

        .drawer-section {
            border-bottom: 1px solid var(--ink);
            padding: 12px 14px;
        }
        .drawer-section:last-child { border-bottom: none; }

        .drawer-label {
            font-size: 7px; letter-spacing: 3px; color: var(--gray);
            text-transform: uppercase; margin-bottom: 10px;
        }

        .nib-slots {
            display: flex; gap: 6px;
        }
        .nib-slot {
            flex: 1;
            display: flex; flex-direction: column; gap: 4px;
            align-items: stretch;
        }
        .nib-slot-btn {
            padding: 5px 0;
            border: 1px solid var(--gray);
            font-family: 'Courier New', monospace;
            font-size: 9px; font-weight: bold; letter-spacing: 0.5px;
            text-align: center; cursor: pointer; color: var(--gray);
            background: var(--bone);
        }
        .nib-slot-btn.active {
            border-color: var(--fired);
            color: var(--fired);
        }
        .nib-slot-select {
            width: 100%;
            font-family: 'Courier New', monospace;
            font-size: 8px;
            border: none; border-bottom: 1px solid var(--gray);
            background: transparent; color: var(--gray);
            cursor: pointer;
            padding: 2px 0;
            -webkit-appearance: none;
            appearance: none;
            text-align: center;
        }
        .nib-slot-select:focus { outline: none; border-color: var(--ink); color: var(--ink); }

        .swatch-row { display: flex; gap: 8px; align-items: center; }
        .swatch {
            width: 20px; height: 20px; border-radius: 50%;
            border: 1px solid rgba(15,15,13,0.25); cursor: pointer;
            flex-shrink: 0;
        }
        .swatch.active { outline: 2px solid var(--fired); outline-offset: 2px; }
        #eraser-mode-btn {
            width: 20px; height: 20px; flex-shrink: 0;
            border: 1px solid var(--ink);
            display: flex; align-items: center; justify-content: center;
            font-size: 8px; font-weight: bold; cursor: pointer;
        }
        #eraser-mode-btn.active { background: var(--ink); color: var(--bone); }

        /* ─────────────────────────────────────────
           BOTTOM TOOLBAR
        ───────────────────────────────────────── */
        #toolbar {
            height: 48px; flex-shrink: 0;
            border-top: 1px solid var(--ink);
            background: var(--bone);
            display: flex; align-items: stretch;
            position: relative; z-index: 10;
        }

        #pal-trigger {
            width: 56px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; letter-spacing: 1px;
            border-right: 1px solid var(--ink);
            color: var(--gray); cursor: pointer;
            touch-action: none;
            -webkit-touch-callout: none;
            flex-shrink: 0;
        }
        #pal-trigger.drawer-open { color: var(--fired); }

        #privacy-toggle {
            width: 44px;
            display: flex; align-items: center; justify-content: center;
            border-right: 1px solid var(--ink);
            font-size: 11px; font-weight: bold; letter-spacing: 1px;
            cursor: pointer; color: var(--gray);
            flex-shrink: 0;
        }
        #privacy-toggle.private { color: var(--ink); }

        #page-nav {
            flex-grow: 1;
            display: flex; align-items: center; justify-content: center;
        }
        .page-prev, .page-next {
            width: 32px; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer; color: var(--gray);
            flex-shrink: 0;
        }
        .page-prev:active, .page-next:active { color: var(--ink); }
        #page-stamp {
            flex-grow: 1; text-align: center;
            font-size: 9px; letter-spacing: 2px;
            color: var(--ink); opacity: 0.45;
            text-transform: uppercase;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        #toolbar-right {
            width: 48px;
            display: flex; flex-direction: column; align-items: stretch;
            border-left: 1px solid var(--ink);
            flex-shrink: 0;
        }

        #ribbon {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid var(--ink);
            cursor: pointer;
        }
        #ribbon-mark {
            width: 5px; height: 16px;
            background: var(--fired);
        }

        #nav-burger {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; cursor: pointer;
        }

        /* ─────────────────────────────────────────
           MENU
        ───────────────────────────────────────── */
        #menu-overlay {
            position: fixed; inset: 0; z-index: 7000;
            background: rgba(15,15,13,0.8);
            display: none; justify-content: flex-end;
        }
        #menu-content {
            width: 300px; height: 100%;
            background: var(--bone);
            border-left: 1px solid var(--ink);
            padding: 60px 40px;
            display: flex; flex-direction: column; gap: 40px;
        }
        .menu-item {
            font-size: 18px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px;
            border-bottom: 1px solid var(--ink);
            padding-bottom: 10px; cursor: pointer;
        }
        .menu-item:hover { text-decoration: underline; }
        .menu-item.dim { opacity: 0.2; cursor: default; }
        .menu-item.dim:hover { text-decoration: none; }
    </style>
</head>
<body>

<!-- ── COVER ── -->
<div id="gate">
    <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <rect width="100%" height="100%" fill="#F0EDE6"/>
        <line x1="0"   y1="20%" x2="100%" y2="20%" stroke="#D1CDC4" stroke-width="0.5"/>
        <line x1="0"   y1="40%" x2="100%" y2="40%" stroke="#D1CDC4" stroke-width="0.5"/>
        <line x1="0"   y1="60%" x2="100%" y2="60%" stroke="#D1CDC4" stroke-width="0.5"/>
        <line x1="0"   y1="80%" x2="100%" y2="80%" stroke="#D1CDC4" stroke-width="0.5"/>
        <line x1="20%" y1="0"   x2="20%" y2="100%" stroke="#D1CDC4" stroke-width="0.5"/>
        <line x1="40%" y1="0"   x2="40%" y2="100%" stroke="#D1CDC4" stroke-width="0.5"/>
        <line x1="60%" y1="0"   x2="60%" y2="100%" stroke="#D1CDC4" stroke-width="0.5"/>
        <line x1="80%" y1="0"   x2="80%" y2="100%" stroke="#D1CDC4" stroke-width="0.5"/>

<!-- ── BRIDGE ── -->

<!-- ── TOC SPREAD ── -->
<div id="toc-spread">
    <div class="page-left">
        <div class="grid-container">
            <div class="grid-cell" id="grid-lab"><span class="mark">//|</span></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell sticky">
                <span style="font-size:7px;color:var(--gray);text-align:center;padding:4px;line-height:1.6;">[ STICKY_INBOX ]</span>

        <div class="toc-list">
            <div class="toc-module">
                <div class="toc-row">
                    <span class="pg-num">001</span>

<!-- ── LAB ── -->
<div id="lab">
    <div id="lab-nav">
        <span class="nav-draf">DRAF.</span>
        <span class="nav-stamp">VOL_01 &middot; 001</span>

    <div id="menu-content" onclick="event.stopPropagation()" ontouchstart="event.stopPropagation()">
        <div class="menu-item" onclick="exitToTOC()" ontouchend="exitToTOC()">&#8592; VOLUME_TOC</div>

        <div class="menu-item" onclick="closeBook()" ontouchend="closeBook()">CLOSE_BOOK</div>
    </div>
</div>

<script>
/* ── NIB DEFINITIONS ── */
const NIB_SIZES = [
    { key: '005',  mm: 0.20 },
    { key: '01',   mm: 0.25 },
    { key: '02',   mm: 0.30 },
    { key: '03',   mm: 0.35 },
    { key: '05',   mm: 0.45 },
    { key: '08',   mm: 0.50 },
    { key: '1',    mm: 0.65 },
    { key: '5mm',  mm: 5.00 },
    { key: '7mm',  mm: 7.00 },
    { key: '10mm', mm: 10.0 },
];

function nibPx(mm) { return mm * 3.78; }

/* ── STATE ── */
let tool             = 'ink';
let inkColor         = '#0F0F0D';
let drawing          = false;
let canvasReady      = false;
let isPrivate        = true;
let holdTimer        = null;
let drawerOpen       = false;

// Quick-swap slots: 3 per tool type
let pencilSlots      = ['02', '05', '08'];
let eraserSlots      = ['02', '05', '08'];
let activePencilSlot = 1;  // default: 05
let activeEraserSlot = 1;

function activePencilMm() {
    const found = NIB_SIZES.find(n => n.key === pencilSlots[activePencilSlot]);
    return found ? found.mm : 0.45;
}
function activeEraserMm() {
    const found = NIB_SIZES.find(n => n.key === eraserSlots[activeEraserSlot]);
    return found ? found.mm : 0.45;
}

/* ── BUILD DRAWER ── */
function buildSlots() {
    buildSlotGroup('pencil-slots', pencilSlots, activePencilSlot, 'pencil');
    buildSlotGroup('eraser-slots', eraserSlots, activeEraserSlot, 'eraser');
}

function buildSlotGroup(containerId, slots, activeIdx, type) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    slots.forEach((nibKey, i) => {
        const slot = document.createElement('div');
        slot.className = 'nib-slot';

        const btn = document.createElement('div');
        btn.className = 'nib-slot-btn' + (i === activeIdx ? ' active' : '');
        btn.textContent = nibKey;
        btn.addEventListener('touchend', e => { e.preventDefault(); activateSlot(type, i); });
        btn.addEventListener('click', () => activateSlot(type, i));

        const sel = document.createElement('select');
        sel.className = 'nib-slot-select';
        NIB_SIZES.forEach(n => {
            const opt = document.createElement('option');
            opt.value = n.key;
            opt.textContent = n.key;
            if (n.key === nibKey) opt.selected = true;
            sel.appendChild(opt);
        });
        sel.addEventListener('change', () => { assignSlot(type, i, sel.value); });

        slot.appendChild(btn);
        slot.appendChild(sel);
        container.appendChild(slot);
    });
}

function activateSlot(type, idx) {
    if (type === 'pencil') {
        activePencilSlot = idx;
        tool = 'ink';
        document.getElementById('eraser-mode-btn').classList.remove('active');
    } else {
        activeEraserSlot = idx;
        tool = 'eraser';
        document.getElementById('eraser-mode-btn').classList.remove('active');
    }
    buildSlots();
}

function assignSlot(type, idx, nibKey) {
    if (type === 'pencil') pencilSlots[idx] = nibKey;
    else eraserSlots[idx] = nibKey;
    buildSlots();
}

/* ── NAVIGATION ── */
function ignite() {
    document.getElementById('gate').style.display = 'none';
    const br = document.getElementById('bridge');
    br.style.display = 'flex';
    setTimeout(() => {
        br.style.display = 'none';
        document.getElementById('toc-spread').style.display = 'grid';
    }, 900);
}

function enterLab() {
    document.getElementById('toc-spread').style.display = 'none';
    document.getElementById('lab').style.display = 'flex';
    buildSlots();
    requestAnimationFrame(() => requestAnimationFrame(initCanvas));
}

function exitToTOC() {
    toggleMenu(false);
    closeDrawer();
    document.getElementById('lab').style.display = 'none';
    document.getElementById('toc-spread').style.display = 'grid';
}

/* ── PRIVACY ── */
function togglePrivacy() {
    isPrivate = !isPrivate;
    const tog   = document.getElementById('privacy-toggle');
    const stamp = document.getElementById('page-stamp');
    if (isPrivate) {
        tog.classList.add('private');
        stamp.textContent = 'PRIVATE \u00B7 VOL_01 \u00B7 001';
    } else {
        tog.classList.remove('private');
        stamp.textContent = 'OPEN \u00B7 VOL_01 \u00B7 001';
    }
}

/* ── DRAWER ── */
function startHold() {
    holdTimer = setTimeout(() => {
        drawerOpen = !drawerOpen;
        const drawer  = document.getElementById('tool-drawer');
        const trigger = document.getElementById('pal-trigger');
        drawer.style.display  = drawerOpen ? 'flex' : 'none';
        trigger.classList.toggle('drawer-open', drawerOpen);
    }, 400);
}
function cancelHold() { clearTimeout(holdTimer); }

function closeDrawer() {
    drawerOpen = false;
    document.getElementById('tool-drawer').style.display = 'none';
    document.getElementById('pal-trigger').classList.remove('drawer-open');
}

/* ── COLOR ── */
function setColor(c) {
    tool = 'ink';
    inkColor = c;
    document.querySelectorAll('.swatch').forEach(el => el.classList.remove('active'));
    const target = document.querySelector(`.swatch[data-color="${c}"]`);
    if (target) target.classList.add('active');
    document.getElementById('eraser-mode-btn').classList.remove('active');
}

function setEraserMode() {
    tool = 'eraser';
    document.querySelectorAll('.swatch').forEach(el => el.classList.remove('active'));
    document.getElementById('eraser-mode-btn').classList.add('active');
}

/* ── MENU ── */
function toggleMenu(open) {
    document.getElementById('menu-overlay').style.display = open ? 'flex' : 'none';
}

function closeBook() {
    toggleMenu(false);
    closeDrawer();
    document.getElementById('lab').style.display = 'none';
    document.getElementById('toc-spread').style.display = 'none';
    document.getElementById('gate').style.display = 'flex';
}

/* ── TOUCH WIRING ── */
function tap(id, fn) {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('touchend', e => { e.preventDefault(); fn(); }, { passive: false });
    el.addEventListener('click', fn);
}

tap('gate', ignite);
tap('grid-lab', enterLab);
tap('privacy-toggle', togglePrivacy);
tap('eraser-mode-btn', setEraserMode);
tap('nav-burger', () => toggleMenu(true));
tap('nav-burger-top', () => toggleMenu(true));
tap('ribbon', () => { /* Phase 2: jump to last modified page */ closeDrawer(); });

document.querySelectorAll('.toc-module').forEach(el => {
    el.addEventListener('touchend', e => { e.preventDefault(); enterLab(); }, { passive: false });
    el.addEventListener('click', enterLab);
});

document.querySelectorAll('.swatch').forEach(el => {
    el.addEventListener('touchend', e => { e.preventDefault(); setColor(el.dataset.color); }, { passive: false });
    el.addEventListener('click', () => setColor(el.dataset.color));
});

const palTrigger = document.getElementById('pal-trigger');
palTrigger.addEventListener('touchstart', e => { e.preventDefault(); startHold(); }, { passive: false });
palTrigger.addEventListener('touchend',   e => { e.preventDefault(); cancelHold(); }, { passive: false });
palTrigger.addEventListener('touchcancel',e => { cancelHold(); });
palTrigger.addEventListener('mousedown', startHold);
palTrigger.addEventListener('mouseup',   cancelHold);
palTrigger.addEventListener('mouseleave',cancelHold);

/* Close drawer when touching canvas */
document.addEventListener('DOMContentLoaded', () => {
    const cvs = document.getElementById('cvs');
    if (cvs) {
        cvs.addEventListener('pointerdown', () => { if (drawerOpen) closeDrawer(); });
    }
});

/* ── CANVAS ── */
function initCanvas() {
    if (canvasReady) return;
    canvasReady = true;

    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    const dpr = window.devicePixelRatio || 1;

    function resize() {
        const r = cvs.getBoundingClientRect();
        cvs.width  = r.width  * dpr;
        cvs.height = r.height * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.fillStyle = '#F5F2EB';
        ctx.fillRect(0, 0, r.width, r.height);
    }
    resize();

    cvs.addEventListener('pointerdown', e => {
        e.preventDefault();
        drawing = true;
        const p = getPos(e);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
    });

    cvs.addEventListener('pointermove', e => {
        e.preventDefault();
        if (!drawing) return;
        const p = getPos(e);
        applyStroke(ctx, p.x, p.y);
    });

    window.addEventListener('pointerup',     () => { drawing = false; });
    window.addEventListener('pointercancel', () => { drawing = false; });

    function getPos(e) {
        const r = cvs.getBoundingClientRect();
        return { x: e.clientX - r.left, y: e.clientY - r.top };
    }
}

function applyStroke(ctx, x, y) {
    ctx.globalCompositeOperation = 'source-over';
    if (tool === 'eraser') {
        ctx.strokeStyle = '#F5F2EB';
        ctx.lineWidth   = nibPx(activeEraserMm());
    } else {
        ctx.strokeStyle = inkColor;
        ctx.lineWidth   = nibPx(activePencilMm());
    }
    ctx.lineCap  = 'round';
    ctx.lineJoin = 'round';
    ctx.lineTo(x, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y);
}
</script>
