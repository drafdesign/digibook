<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRAF. // VOLE.</title>
    <style>
        :root {
            --ink: #0F0F0D;
            --bone: #F5F2EB;
            --fired: #D4500A;
            --blueprint: #1A3A5C;
        }

        /* VOLE. SURFACE INTEGRITY */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--ink);
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; touch-action: none;
        }

        .digibook-frame {
            width: 100vw; height: 94vh; max-width: 1024px;
            background-color: var(--bone); border: 1px solid var(--ink);
            position: relative; padding: 40px; display: flex; flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* LAYER 1: THE DOT GRID */
        .grid-bg {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(var(--ink) 0.5px, transparent 0.5px);
            background-size: 15.1px 15.1px; 
            opacity: 0.08; pointer-events: none; z-index: 1;
        }

        .header, .footer { position: relative; z-index: 2; color: var(--ink); }
        
        .header {
            display: flex; justify-content: space-between; align-items: baseline;
            border-bottom: 1.5px solid var(--ink); padding-bottom: 10px; margin-bottom: 50px;
        }

        .brand { font-weight: 900; font-size: 24px; letter-spacing: -1.5px; }
        .brand span { color: var(--fired); }

        .meta { 
            font-size: 10px; text-transform: uppercase; text-align: right;
            line-height: 1.4; color: rgba(15, 15, 13, 0.5);
        }

        .content-area {
            position: relative; z-index: 2; flex-grow: 1;
            display: flex; justify-content: center; align-items: center;
        }

        /* TRANSPLANT ANIMATION LOGIC */
        .status-box {
            text-align: center; cursor: pointer;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s ease;
        }

        .status-box.dissolved {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.98);
        }

        .status-tag {
            background: var(--ink); color: var(--bone);
            padding: 8px 18px; font-size: 11px; display: inline-block;
            margin-bottom: 25px; letter-spacing: 1px;
        }

        .footer {
            margin-top: 50px; border-top: 1.5px solid var(--ink);
            padding-top: 15px; display: flex; justify-content: space-between;
            font-size: 9px; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="digibook-frame">
    <div class="grid-bg"></div>
    
    <div class="header">
        <div class="brand">DRAF<span>.</span></div>
        <div class="meta">
            INTERNAL_PROJECT: [VOLE]<br>
            REVISION: RECLINED_STABLE_V1
        </div>
    </div>

    <div class="content-area">
        <div id="transplant-target" class="status-box" onclick="initiateTransplant()">
            <div class="status-tag">SYSTEM_REVIVAL // IN_PROGRESS</div>
            <p style="letter-spacing: 3px; font-size: 12px; font-weight: bold;">AUTOPSY COMPLETE. AWAITING TRANSPLANT.</p>
        </div>
    </div>

    <div class="footer">
        <div>SHANE SMILEY // PRINCIPAL</div>
        <div>//| DRAF. STUDIO 2026.03.21</div>
        <div>STABLE_VIEWPORT_V1</div>
    </div>
</div>

<script>
    function initiateTransplant() {
        const target = document.getElementById('transplant-target');
        target.classList.add('dissolved');
        console.log("VOLE. // Transplant initiated. Surface ready.");
    }
</script>

</body>
</html>
