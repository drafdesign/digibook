<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VOLE // VOL_01</title>
    <style>
        :root {
            --bone: #F5F2EB;
            --ink:  #0F0F0D;
            --fired: #D4500A;
            --blueprint: #1A3A5C;
            --pink: #F48FB1;
            --gray: #D1CDC4;
            --gutter: 24px;
        }

        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        #cvs, #cvs-r { touch-action: none; }

        #gate, .toc-module, .grid-cell, .menu-item,
        #privacy-toggle, #pal-trigger, .nib-btn,
        .swatch, .eraser-btn, .nav-burger { touch-action: manipulation; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bone);
            font-family: 'Courier New', monospace;
            color: var(--ink);
        }

        #gate {
            position: fixed; inset: 0; z-index: 5000;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        #gate svg {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
        }

        #bridge {
            position: fixed; inset: 0; z-index: 6000;
            display: none;
            align-items: center; justify-content: center;
            background: var(--bone);
            font-size: 80px; font-weight: 900;
            letter-spacing: -2px;
        }

        #toc-spread {
            position: fixed; inset: 0; z-index: 4000;
            display: none;
            grid-template-columns: 1fr 1fr;
            background: var(--bone);
        }

        .page-left {
            border-right: 1px solid rgba(15,15,13,0.15);
            display: flex; align-items: center; justify-content: center;
            padding: 60px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 22vw);
            grid-template-rows:    repeat(4, 22vw);
            gap: var(--gutter);
        }

        @media (max-height: 900px) {
            .grid-container {
                grid-template-columns: repeat(2, 20vw);
                grid-template-rows:    repeat(4, 20vw);
            }
        }

        .grid-cell {
            border: 1px solid var(--ink);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .grid-cell.sticky { background: #FFFDE7; }
        .mark { font-size: 28px; font-weight: 900; letter-spacing: -1px; }

        /* TOC grid shape variants */
        .grid-cell.rounded-top    { border-radius: 18px 18px 0 0; }
        .grid-cell.rounded-bottom { border-radius: 0 0 18px 18px; }
        .grid-cell.rounded-all    { border-radius: 18px; }

        /* Diagonal stripe fill (first cell) */
        .stripe-fill {
            position: absolute; inset: 0;
            background: repeating-linear-gradient(
                135deg,
                var(--pink) 0px,
                var(--pink) 18px,
                transparent 18px,
                transparent 36px
            );
        }

        .page-right {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 80px 60px; overflow: hidden;
        }

        .toc-list { width: 100%; max-width: 400px; }

        .toc-module {
            padding: 20px 0;
            border-bottom: 1px solid var(--ink);
            cursor: pointer;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toc-module:first-child { border-top: 1px solid var(--ink); }
        .toc-module:hover .proj-title { text-decoration: underline; }

        .toc-row { display: flex; justify-content: space-between; align-items: baseline; }

        .pg-num      { font-size: 14px; font-weight: bold; }
        .proj-title  { font-size: 18px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .proj-status { font-size: 10px; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; }

        /* LAB */
        #lab {
            position: fixed; inset: 0; z-index: 1000;
            display: none; flex-direction: column;
        }

        #lab-nav {
            height: 48px; flex-shrink: 0;
            border-bottom: 1px solid var(--ink);
            background: var(--bone);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px;
            position: relative; z-index: 10;
        }
        .nav-draf   { font-size: 14px; font-weight: 900; letter-spacing: 2px; }
        .nav-stamp  {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-size: 10px; letter-spacing: 2px; color: var(--ink);
            opacity: 0.4;
        }
        .nav-burger { font-size: 20px; cursor: pointer; line-height: 1; }

        /* PAGE AREA — holds one or two page panels */
        #page-area {
            flex-grow: 1; position: relative; overflow: hidden;
            display: flex;
        }

        /* A single page panel: portrait or one half of a spread */
        .page-panel {
            position: relative;
            flex: 1;
            overflow: hidden;
        }
        .page-panel + .page-panel {
            border-left: 2px solid rgba(15,15,13,0.18);
        }

        .dot-grid {
            position: absolute; inset: 0; z-index: 1; pointer-events: none;
            background-image: radial-gradient(var(--ink) 0.5px, transparent 0.5px);
            background-size: 15.1px 15.1px;
            opacity: 0.08;
        }

        .page-canvas {
            position: absolute; inset: 0; z-index: 2;
            display: block; width: 100%; height: 100%;
            cursor: crosshair;
            touch-action: none;
        }

        /* Zoom indicator — top right of each panel, fades out */
        .zoom-badge {
            position: absolute; top: 12px; right: 12px; z-index: 8;
            font-size: 9px; letter-spacing: 2px; color: var(--gray);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .zoom-badge.show { opacity: 1; }

        #pal-trigger {
            position: absolute; bottom: 16px; left: 16px; z-index: 5;
            width: 32px; height: 32px;
            background: var(--fired);
            border-radius: 50%;
            cursor: pointer;
            touch-action: none;
            -webkit-touch-callout: none;
            display: flex; align-items: center; justify-content: center;
        }

        #palette {
            position: absolute; bottom: 60px; left: 16px; z-index: 6;
            background: var(--bone); border: 1px solid var(--ink);
            padding: 16px; display: none; flex-direction: column; gap: 16px;
            min-width: 120px;
        }

        .pal-label {
            font-size: 8px; letter-spacing: 3px; color: var(--gray);
            text-transform: uppercase; margin-bottom: 6px;
        }

        .nib-row { display: flex; gap: 14px; align-items: center; }
        .nib-btn {
            font-size: 9px; font-weight: bold; letter-spacing: 1px;
            color: var(--gray); border-bottom: 1px solid transparent;
            padding-bottom: 2px; cursor: pointer;
        }
        .nib-btn.active { color: var(--fired); border-color: var(--fired); }

        .swatch-row { display: flex; gap: 8px; align-items: center; }
        .swatch {
            width: 20px; height: 20px; border-radius: 50%;
            border: 1px solid rgba(15,15,13,0.25); cursor: pointer;
            flex-shrink: 0;
        }
        .swatch.active { outline: 2px solid var(--fired); outline-offset: 2px; }

        .eraser-btn {
            width: 20px; height: 20px; flex-shrink: 0;
            border: 1px solid var(--ink);
            display: flex; align-items: center; justify-content: center;
            font-size: 8px; font-weight: bold; cursor: pointer;
        }
        .eraser-btn.active { background: var(--ink); color: var(--bone); }

        #privacy-toggle {
            position: absolute; bottom: 16px; left: 60px; z-index: 5;
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 2px solid var(--gray);
            background: transparent;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        #privacy-toggle.private {
            background: var(--fired);
            border-color: var(--fired);
        }

        #page-status {
            position: absolute; bottom: 16px; right: 16px; z-index: 5;
            font-size: 9px; letter-spacing: 2px; color: var(--gray);
            text-transform: uppercase; pointer-events: none;
        }

        #menu-overlay {
            position: fixed; inset: 0; z-index: 7000;
            background: rgba(15,15,13,0.8);
            display: none; justify-content: flex-end;
        }
        #menu-content {
            width: 300px; height: 100%;
            background: var(--bone);
            border-left: 1px solid var(--ink);
            padding: 60px 40px;
            display: flex; flex-direction: column; gap: 40px;
        }
        .menu-item {
            font-size: 18px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px;
            border-bottom: 1px solid var(--ink);
            padding-bottom: 10px; cursor: pointer;
        }
        .menu-item:hover { text-decoration: underline; }
        .menu-item.dim { opacity: 0.2; cursor: default; }
        .menu-item.dim:hover { text-decoration: none; }
    </style>
</head>
<body>

<!-- COVER -->
<div id="gate">
    <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <rect width="100%" height="100%" fill="#F0EDE6"/>
        <line x1="0"   y1="20%" x2="100%" y2="20%" stroke="#D1CDC4" stroke-width="0.5"/>
        <line x1="0"   y1="40%" x2="100%" y2="40%" stroke="#D1CDC4" stroke-width="0.5"/>
        <line x1="0"   y1="60%" x2="100%" y2="60%" stroke="#D1CDC4" stroke-width="0.5"/>
        <line x1="0"   y1="80%" x2="100%" y2="80%" stroke="#D1CDC4" stroke-width="0.5"/>
        <line x1="20%" y1="0"   x2="20%" y2="100%" stroke="#D1CDC4" stroke-width="0.5"/>
        <line x1="40%" y1="0"   x2="40%" y2="100%" stroke="#D1CDC4" stroke-width="0.5"/>
        <line x1="60%" y1="0"   x2="60%" y2="100%" stroke="#D1CDC4" stroke-width="0.5"/>
        <line x1="80%" y1="0"   x2="80%" y2="100%" stroke="#D1CDC4" stroke-width="0.5"/>
        <text x="50%" y="47%" text-anchor="middle" font-family="Courier New, monospace"
              font-size="36" font-weight="900" fill="#0F0F0D" letter-spacing="4">DRAF.</text>
        <text x="50%" y="56%" text-anchor="middle" font-family="Courier New, monospace"
              font-size="10" fill="#D1CDC4" letter-spacing="6">TAP TO OPEN</text>
        <rect x="0" y="0" width="8" height="100%" fill="#F48FB1"/>
    </svg>
</div>

<!-- BRIDGE -->
<div id="bridge">//|</div>

<!-- TOC SPREAD -->
<div id="toc-spread">
    <div class="page-left">
        <div class="grid-container">
            <!-- Row 1: stripe cell + rounded-top cell -->
            <div class="grid-cell rounded-all" id="grid-lab" onclick="enterLab()" style="cursor:pointer;">
                <div class="stripe-fill"></div>
            </div>
            <div class="grid-cell rounded-top"></div>
            <!-- Row 2: plain squares -->
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <!-- Row 3: plain squares -->
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <!-- Row 4: U-shapes (rounded bottom) -->
            <div class="grid-cell rounded-bottom"></div>
            <div class="grid-cell rounded-bottom"></div>
        </div>
    </div>
    <div class="page-right">
        <div class="toc-list">
            <div class="toc-module" onclick="enterLab()">
                <div class="toc-row">
                    <span class="pg-num">001</span>
                    <span class="proj-title">LABORATORY_SKETCH</span>
                </div>
                <div class="toc-row">
                    <span></span>
                    <span class="proj-status">ACTIVE_REGISTRY</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- LAB -->
<div id="lab">
    <div id="lab-nav">
        <span class="nav-draf">DRAF.</span>
        <span class="nav-stamp" id="nav-stamp">VOL_01 &middot; 001</span>
        <span class="nav-burger" onclick="toggleMenu(true)">&#9776;</span>
    </div>
    <div id="page-area">
        <!-- panels injected by JS based on orientation -->
    </div>
    <!-- UI overlays live outside panels so they don't split -->
    <div id="privacy-toggle" class="private" onclick="togglePrivacy()"></div>
    <div id="pal-trigger"></div>
    <div id="palette">
        <div>
            <div class="pal-label">NIB</div>
            <div class="nib-row">
                <span class="nib-btn" data-nib="02">02</span>
                <span class="nib-btn active" data-nib="05">05</span>
                <span class="nib-btn" data-nib="08">08</span>
            </div>
        </div>
        <div>
            <div class="pal-label">INK</div>
            <div class="swatch-row">
                <div class="swatch active" data-color="#0F0F0D" style="background:#0F0F0D"></div>
                <div class="swatch" data-color="#F48FB1" style="background:#F48FB1"></div>
                <div class="swatch" data-color="#D4500A" style="background:#D4500A"></div>
                <div class="swatch" data-color="#1A3A5C" style="background:#1A3A5C"></div>
                <div class="eraser-btn" id="eraser-btn">E</div>
            </div>
        </div>
    </div>
    <div id="page-status">PRIVATE &middot; VOL_01 &middot; 001</div>
</div>

<!-- MENU -->
<div id="menu-overlay" onclick="toggleMenu(false)">
    <div id="menu-content" onclick="event.stopPropagation()" ontouchstart="event.stopPropagation()">
        <div class="menu-item" onclick="exitToTOC()" ontouchend="exitToTOC()">&#8592; VOLUME_TOC</div>
        <div class="menu-item dim">PROJECT_INDEX</div>
        <div class="menu-item dim">WORK</div>
        <div class="menu-item dim">FORCE_SYNC</div>
        <div class="menu-item dim">IMPORT</div>
        <div class="menu-item" onclick="closeBook()" ontouchend="closeBook()">CLOSE_BOOK</div>
    </div>
</div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const NIBS     = { '02': 0.30 * 3.78, '05': 0.45 * 3.78, '08': 0.50 * 3.78 };
const STORE_L  = 'vole_vol01_001_L';
const STORE_R  = 'vole_vol01_001_R';

// ─── STATE ───────────────────────────────────────────────────────────────────
let tool        = 'ink';
let inkColor    = '#0F0F0D';
let nibKey      = '05';
let isPrivate   = true;
let holdTimer   = null;
let paletteOpen = false;
let isSpread    = false;   // landscape = two panels

// Per-panel state
// panels: { el, cvs, ctx, dpr, zoom, panX, panY, drawing, lastX, lastY }
let panels = [];

// Active pointer tracking for pinch/pan gesture (per panel)
// panelGesture[panelIdx] = { pointers: Map<id, {x,y}>, mode: 'idle'|'pan'|'pinch', initDist, initZoom, initMidX, initMidY, initPanX, initPanY }
let panelGesture = [];

// ─── BOOT ─────────────────────────────────────────────────────────────────────
function ignite() {
    document.getElementById('gate').style.display = 'none';
    const br = document.getElementById('bridge');
    br.style.display = 'flex';
    setTimeout(() => {
        br.style.display = 'none';
        document.getElementById('toc-spread').style.display = 'grid';
    }, 900);
}

function enterLab() {
    document.getElementById('toc-spread').style.display = 'none';
    document.getElementById('lab').style.display = 'flex';
    buildPanels();
}

function exitToTOC() {
    toggleMenu(false);
    teardownPanels();
    document.getElementById('lab').style.display = 'none';
    document.getElementById('toc-spread').style.display = 'grid';
}

function closeBook() {
    toggleMenu(false);
    teardownPanels();
    document.getElementById('lab').style.display = 'none';
    document.getElementById('toc-spread').style.display = 'none';
    document.getElementById('gate').style.display = 'flex';
}

// ─── PANEL LIFECYCLE ─────────────────────────────────────────────────────────

function buildPanels() {
    const area = document.getElementById('page-area');
    area.innerHTML = '';
    panels = [];
    panelGesture = [];

    isSpread = window.innerWidth > window.innerHeight;
    const count = isSpread ? 2 : 1;
    const storageKeys = [STORE_L, STORE_R];

    for (let i = 0; i < count; i++) {
        const panel = document.createElement('div');
        panel.className = 'page-panel';

        const grid = document.createElement('div');
        grid.className = 'dot-grid';

        const cvs = document.createElement('canvas');
        cvs.className = 'page-canvas';
        cvs.id = i === 0 ? 'cvs' : 'cvs-r';

        const badge = document.createElement('div');
        badge.className = 'zoom-badge';
        badge.id = 'zoom-badge-' + i;

        panel.appendChild(grid);
        panel.appendChild(cvs);
        panel.appendChild(badge);
        area.appendChild(panel);

        const dpr = window.devicePixelRatio || 1;
        const state = {
            idx: i,
            el: panel,
            cvs,
            ctx: null,
            dpr,
            zoom: 1,
            panX: 0,
            panY: 0,
            drawing: false,
            lastX: 0,
            lastY: 0,
            storageKey: storageKeys[i],
            badge,
            zoomTimer: null
        };
        panels.push(state);
        panelGesture.push({ pointers: new Map(), mode: 'idle' });

        initPanel(state);
        attachPanelEvents(state);
    }

    // Orientation change
    window.addEventListener('orientationchange', onOrientationChange);
    window.addEventListener('resize', onOrientationChange);
}

let orientationDebounce = null;
function onOrientationChange() {
    clearTimeout(orientationDebounce);
    orientationDebounce = setTimeout(() => {
        if (document.getElementById('lab').style.display !== 'none') {
            saveAll();
            buildPanels();
        }
    }, 300);
}

function teardownPanels() {
    saveAll();
    window.removeEventListener('orientationchange', onOrientationChange);
    window.removeEventListener('resize', onOrientationChange);
    document.getElementById('page-area').innerHTML = '';
    panels = [];
    panelGesture = [];
}

function saveAll() {
    panels.forEach(p => savePanel(p));
}

// ─── CANVAS INIT & PERSISTENCE ───────────────────────────────────────────────

function initPanel(p) {
    const r  = p.cvs.getBoundingClientRect();
    p.cvs.width  = r.width  * p.dpr;
    p.cvs.height = r.height * p.dpr;
    p.ctx = p.cvs.getContext('2d');
    p.ctx.setTransform(p.dpr, 0, 0, p.dpr, 0, 0);

    // Fill bone
    p.ctx.fillStyle = '#F5F2EB';
    p.ctx.fillRect(0, 0, r.width, r.height);

    // Restore saved drawing
    const saved = localStorage.getItem(p.storageKey);
    if (saved) {
        const img = new Image();
        img.onload = () => {
            applyTransform(p);
            p.ctx.drawImage(img, 0, 0, r.width, r.height);
        };
        img.src = saved;
    }
}

function savePanel(p) {
    try {
        const data = p.cvs.toDataURL('image/png');
        localStorage.setItem(p.storageKey, data);
    } catch (e) {
        // localStorage full or unavailable — silent fail
    }
}

// ─── TRANSFORM HELPERS ───────────────────────────────────────────────────────

function applyTransform(p) {
    p.ctx.setTransform(p.dpr * p.zoom, 0, 0, p.dpr * p.zoom, p.panX * p.dpr, p.panY * p.dpr);
}

function clampPan(p) {
    const w = p.cvs.getBoundingClientRect().width;
    const h = p.cvs.getBoundingClientRect().height;
    const maxPanX = 0;
    const minPanX = w * (1 - p.zoom);
    const maxPanY = 0;
    const minPanY = h * (1 - p.zoom);
    p.panX = Math.min(maxPanX, Math.max(minPanX, p.panX));
    p.panY = Math.min(maxPanY, Math.max(minPanY, p.panY));
}

function canvasToClient(p, cx, cy) {
    // Convert canvas coords (in page space) back to client coords
    return {
        x: (cx - p.panX) * p.zoom,
        y: (cy - p.panY) * p.zoom
    };
}

function clientToCanvas(p, clientX, clientY) {
    const r = p.cvs.getBoundingClientRect();
    const lx = clientX - r.left;
    const ly = clientY - r.top;
    return {
        x: lx / p.zoom - p.panX / p.zoom,
        y: ly / p.zoom - p.panY / p.zoom
    };
    // Simpler: canvas coords = (client - pan) / zoom
    // Actually with transform: ctx coord = (client / zoom) - panX... let's be precise.
    // ctx.setTransform(dpr*zoom, 0, 0, dpr*zoom, panX*dpr, panY*dpr)
    // So: screen_x = canvas_x * dpr * zoom + panX * dpr  =>  canvas_x = (screen_x/dpr - panX) / zoom
    // But we work in CSS pixels (no dpr), so:
    //   css_screen_x = canvas_x * zoom + panX  =>  canvas_x = (css_screen_x - panX) / zoom
}

// Correct version used everywhere:
function getCanvasPos(p, clientX, clientY) {
    const r = p.cvs.getBoundingClientRect();
    const lx = clientX - r.left;
    const ly = clientY - r.top;
    return {
        x: (lx - p.panX) / p.zoom,
        y: (ly - p.panY) / p.zoom
    };
}

function showZoomBadge(p) {
    p.badge.textContent = Math.round(p.zoom * 100) + '%';
    p.badge.classList.add('show');
    clearTimeout(p.zoomTimer);
    p.zoomTimer = setTimeout(() => p.badge.classList.remove('show'), 1200);
}

// ─── REDRAW ───────────────────────────────────────────────────────────────────
// After pan/zoom we need to re-apply the transform. The canvas content stays
// in page space; we move it with the transform, then clip.
// This means the backing canvas IS page-space, always 1:1 in page units.
// We just set the transform and redraw from saved image for a clean frame.

function redrawPanel(p) {
    const r = p.cvs.getBoundingClientRect();
    const w = r.width, h = r.height;

    // Save current canvas content
    const saved = p.cvs.toDataURL('image/png');
    const img = new Image();
    img.onload = () => {
        // Reset to identity, fill bone
        p.ctx.setTransform(p.dpr, 0, 0, p.dpr, 0, 0);
        p.ctx.fillStyle = '#F5F2EB';
        p.ctx.fillRect(0, 0, w, h);
        // Apply zoom/pan transform, draw content
        applyTransform(p);
        p.ctx.drawImage(img, 0, 0, w, h);
    };
    img.src = saved;
}

// ─── POINTER EVENTS ───────────────────────────────────────────────────────────

function attachPanelEvents(p) {
    const cvs = p.cvs;
    const idx = p.idx;

    cvs.addEventListener('pointerdown', e => {
        e.preventDefault();
        const g = panelGesture[idx];
        g.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

        if (e.pointerType === 'pen') {
            // Draw
            p.drawing = true;
            const pos = getCanvasPos(p, e.clientX, e.clientY);
            p.lastX = pos.x; p.lastY = pos.y;
            p.ctx.beginPath();
            p.ctx.moveTo(pos.x, pos.y);
        } else {
            // Touch / finger — navigate
            if (g.pointers.size === 2) {
                // Transition to pinch
                const pts = [...g.pointers.values()];
                const dx = pts[1].x - pts[0].x;
                const dy = pts[1].y - pts[0].y;
                g.initDist  = Math.hypot(dx, dy);
                g.initZoom  = p.zoom;
                g.initMidX  = (pts[0].x + pts[1].x) / 2;
                g.initMidY  = (pts[0].y + pts[1].y) / 2;
                g.initPanX  = p.panX;
                g.initPanY  = p.panY;
                g.mode = 'pinch';
            } else if (g.pointers.size === 1) {
                g.mode = 'pan';
                g.initPanX = p.panX;
                g.initPanY = p.panY;
                g.startX = e.clientX;
                g.startY = e.clientY;
            }
        }
    }, { passive: false });

    cvs.addEventListener('pointermove', e => {
        e.preventDefault();
        const g = panelGesture[idx];

        if (e.pointerType === 'pen') {
            if (!p.drawing) return;
            const pos = getCanvasPos(p, e.clientX, e.clientY);
            applyStroke(p, pos.x, pos.y);
            p.lastX = pos.x; p.lastY = pos.y;
            return;
        }

        // Finger move
        if (!g.pointers.has(e.pointerId)) return;
        g.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

        if (g.mode === 'pan' && g.pointers.size === 1) {
            const dx = e.clientX - g.startX;
            const dy = e.clientY - g.startY;
            p.panX = g.initPanX + dx;
            p.panY = g.initPanY + dy;
            clampPan(p);
            redrawPanel(p);
            showZoomBadge(p);
        } else if (g.mode === 'pinch' && g.pointers.size === 2) {
            const pts = [...g.pointers.values()];
            const dx = pts[1].x - pts[0].x;
            const dy = pts[1].y - pts[0].y;
            const dist = Math.hypot(dx, dy);
            const scale = dist / g.initDist;
            const newZoom = Math.min(8, Math.max(1, g.initZoom * scale));

            const midX = (pts[0].x + pts[1].x) / 2;
            const midY = (pts[0].y + pts[1].y) / 2;
            const r = p.cvs.getBoundingClientRect();
            const lmx = midX - r.left;
            const lmy = midY - r.top;

            // Zoom around midpoint
            p.panX = lmx - (lmx - g.initPanX) * (newZoom / g.initZoom);
            p.panY = lmy - (lmy - g.initPanY) * (newZoom / g.initZoom);
            p.zoom = newZoom;
            clampPan(p);
            redrawPanel(p);
            showZoomBadge(p);
        }
    }, { passive: false });

    const endDraw = e => {
        if (e.pointerType === 'pen') {
            if (p.drawing) {
                p.drawing = false;
                savePanel(p); // persist on pen lift
            }
        } else {
            const g = panelGesture[idx];
            g.pointers.delete(e.pointerId);
            if (g.pointers.size < 2) g.mode = g.pointers.size === 1 ? 'pan' : 'idle';
            if (g.pointers.size === 1) {
                // Reset pan reference for remaining finger
                const remaining = [...g.pointers.values()][0];
                g.startX = remaining.x; g.startY = remaining.y;
                g.initPanX = p.panX; g.initPanY = p.panY;
            }
        }
    };

    cvs.addEventListener('pointerup',     endDraw, { passive: true });
    cvs.addEventListener('pointercancel', endDraw, { passive: true });
}

// ─── STROKE ───────────────────────────────────────────────────────────────────

function applyStroke(p, x, y) {
    const nibPx = (NIBS[nibKey] || 1.7) / p.zoom;  // compensate for zoom
    applyTransform(p);

    if (tool === 'eraser') {
        p.ctx.globalCompositeOperation = 'source-over';
        p.ctx.strokeStyle = '#F5F2EB';
        p.ctx.lineWidth   = 24 / p.zoom;
    } else {
        p.ctx.globalCompositeOperation = 'source-over';
        p.ctx.strokeStyle = inkColor;
        p.ctx.lineWidth   = nibPx;
    }
    p.ctx.lineCap  = 'round';
    p.ctx.lineJoin = 'round';
    p.ctx.lineTo(x, y);
    p.ctx.stroke();
    p.ctx.beginPath();
    p.ctx.moveTo(x, y);
}

// ─── UI ───────────────────────────────────────────────────────────────────────

function togglePrivacy() {
    isPrivate = !isPrivate;
    const tog = document.getElementById('privacy-toggle');
    const sta = document.getElementById('page-status');
    if (isPrivate) {
        tog.classList.add('private');
        sta.innerHTML = 'PRIVATE &middot; VOL_01 &middot; 001';
    } else {
        tog.classList.remove('private');
        sta.innerHTML = 'OPEN &middot; VOL_01 &middot; 001';
    }
}

function startHold() {
    holdTimer = setTimeout(() => {
        paletteOpen = !paletteOpen;
        document.getElementById('palette').style.display = paletteOpen ? 'flex' : 'none';
    }, 400);
}
function cancelHold() { clearTimeout(holdTimer); }

function setNib(n) {
    nibKey = n;
    document.querySelectorAll('.nib-btn').forEach(el => el.classList.remove('active'));
    document.querySelector(`.nib-btn[data-nib="${n}"]`).classList.add('active');
}

function setColor(c) {
    tool = 'ink';
    inkColor = c;
    document.querySelectorAll('.swatch').forEach(el => el.classList.remove('active'));
    document.querySelector(`.swatch[data-color="${c}"]`).classList.add('active');
    document.getElementById('eraser-btn').classList.remove('active');
}

function setEraser() {
    tool = 'eraser';
    document.querySelectorAll('.swatch').forEach(el => el.classList.remove('active'));
    document.getElementById('eraser-btn').classList.add('active');
}

function toggleMenu(open) {
    document.getElementById('menu-overlay').style.display = open ? 'flex' : 'none';
}

// ─── EVENT WIRING ─────────────────────────────────────────────────────────────

function tap(id, fn) {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('touchend', e => { e.preventDefault(); fn(); }, { passive: false });
    el.addEventListener('click', fn);
}

tap('grid-lab', enterLab);
tap('privacy-toggle', togglePrivacy);
tap('gate', ignite);

document.querySelectorAll('.toc-module').forEach(el => {
    el.addEventListener('touchend', e => { e.preventDefault(); enterLab(); }, { passive: false });
});

document.querySelectorAll('.nib-btn').forEach(el => {
    el.addEventListener('click',    () => setNib(el.dataset.nib));
    el.addEventListener('touchend', e => { e.preventDefault(); setNib(el.dataset.nib); }, { passive: false });
});

document.querySelectorAll('.swatch').forEach(el => {
    el.addEventListener('click',    () => setColor(el.dataset.color));
    el.addEventListener('touchend', e => { e.preventDefault(); setColor(el.dataset.color); }, { passive: false });
});

tap('eraser-btn', setEraser);
tap('nav-burger',  () => toggleMenu(true));

const palTrigger = document.getElementById('pal-trigger');
palTrigger.addEventListener('touchstart',  e => { e.preventDefault(); startHold(); }, { passive: false });
palTrigger.addEventListener('touchend',    e => { e.preventDefault(); cancelHold(); }, { passive: false });
palTrigger.addEventListener('touchcancel', e => { cancelHold(); }, { passive: false });
palTrigger.addEventListener('mousedown',   startHold);
palTrigger.addEventListener('mouseup',     cancelHold);
palTrigger.addEventListener('mouseleave',  cancelHold);

</script>
