<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DRAF. // VOLE. V2.4 REV-D</title>
    <style>
        :root {
            --bone: #F5F2EB;
            --ink: #0F0F0D;
            --spring-pink: #F48FB1;
            --dot: rgba(15,15,13,0.05);
            --transition: 400ms cubic-bezier(0.4, 0, 0.2, 1);
            --nav-height: 80px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; touch-action: none; -webkit-touch-callout: none; }
        body { background: var(--ink); font-family: 'Courier New', Courier, monospace; overflow: hidden; height: 100vh; }

        /* --- COVER (RYO SPRING) --- */
        #screen-cover {
            position: fixed; inset: 0; z-index: 2000; background: var(--bone);
            display: flex; justify-content: center; align-items: center; transition: opacity var(--transition);
        }
        #cover-image {
            max-width: 100%; max-height: 100%; object-fit: contain; /* Maintain Aspect Ratio */
        }
        .ribbon-cover {
            position: absolute; bottom: 48px; left: 50%; width: 32px; height: 100px;
            background: var(--spring-pink); transform: translateX(-50%); z-index: 2100;
        }

        /* --- THE HANDSHAKE --- */
        #threshold { position: fixed; inset: 0; z-index: 3000; background: var(--bone); display: none; justify-content: center; align-items: center; font-size: 80px; font-weight: 900; }

        /* --- FIXED UI --- */
        #ui-layer { position: fixed; inset: 0; z-index: 1000; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        .nav-bar, .footer-bar { height: var(--nav-height); width: 100%; background: var(--bone); pointer-events: auto; display: flex; align-items: center; padding: 0 40px; font-size: 10px; }
        .footer-bar { justify-content: space-between; border-top: 0.5px solid rgba(0,0,0,0.05); }
        .ribbon-gutter { position: absolute; top: 0; bottom: 0; left: 50%; width: 32px; background: var(--spring-pink); transform: translateX(-50%); }

        /* --- TOC & WORKSPACE --- */
        #main-viewport { position: absolute; top: var(--nav-height); bottom: var(--nav-height); left: 0; right: 0; background: var(--bone); overflow: hidden; display: none; }
        #canvas-container { width: 100%; height: 100%; display: grid; grid-template-columns: 1fr 1fr; transform-origin: center; }
        .page-surface { position: relative; height: 100%; border-right: 1px solid rgba(0,0,0,0.02); }
        .dot-grid { position: absolute; inset: 0; pointer-events: none; background-image: radial-gradient(var(--dot) 0.5px, transparent 0.5px); background-size: 15.1px 15.1px; }

        /* --- TOC SPECIFIC --- */
        .toc-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(4, 1fr); gap: 20px; padding: 60px; height: 100%; }
        .cell { border: 1px solid var(--ink); display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }
        .toc-list { padding: 60px; display: flex; flex-direction: column; gap: 10px; }
        .list-item { font-size: 10px; border-bottom: 0.5px solid rgba(0,0,0,0.1); padding: 10px 0; }

        .show { display: flex !important; }
        .show-grid { display: grid !important; }
        .hide { display: none !important; }
    </style>
</head>
<body>

    <section id="screen-cover" onclick="triggerHandshake()">
        <img id="cover-image" src="RYO_SPRING_PLACEHOLDER.png" alt="Ryo Spring Cover">
        <div class="ribbon-cover"></div>
    </section>

    <div id="threshold">//|</div>

    <div id="ui-layer" class="hide">
        <header class="nav-bar">DRAF. // REGISTRY</header>
        <div class="ribbon-gutter"></div>
        <footer class="footer-bar">
            <div class="marker" id="p-left">[882]</div>
            <div style="display:flex; gap:20px;"><span>TOC</span><span>INDEX</span><span>WORK</span></div>
            <div class="marker" id="p-right">[883]</div>
        </footer>
    </div>

    <main id="main-viewport">
        <div id="canvas-container">
            <article class="page-surface" id="left-page">
                <div class="dot-grid"></div>
                <div class="toc-grid" id="grid-content">
                    <div class="cell" onclick="loadLab()">//|</div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell"></div>
                    <div class="cell"></div><div class="cell" style="background:#FCF59B; border:none;">INBOX</div>
                </div>
            </article>
            <article class="page-surface" id="right-page">
                <div class="dot-grid"></div>
                <div class="toc-list" id="list-content">
                    <div class="list-item">[[20260323]] - [08:11] *RYO_SPRING_COVER* DEPLOYED</div>
                    <div class="list-item">[[20260323]] - [08:12] // NEW_SESSION (Shane)</div>
                    <div class="list-item">[[20260323]] - [08:13] METADATA LINEAGE (Kieran)</div>
                </div>
            </article>
        </div>
    </main>

    <script>
        const cover = document.getElementById('screen-cover');
        const thresh = document.getElementById('threshold');
        const ui = document.getElementById('ui-layer');
        const main = document.getElementById('main-viewport');
        const container = document.getElementById('canvas-container');

        window.oncontextmenu = (e) => e.preventDefault();

        function triggerHandshake() {
            cover.classList.add('hide');
            thresh.classList.add('show');
            setTimeout(() => {
                thresh.classList.remove('show');
                ui.classList.add('show');
                main.classList.add('show-grid');
            }, 400);
        }

        function loadLab() {
            document.getElementById('grid-content').classList.add('hide');
            document.getElementById('list-content').classList.add('hide');
            document.querySelector('.nav-bar').innerText = "DRAF. // LABORATORY";
            document.getElementById('p-left').innerText = "[002]";
            document.getElementById('p-right').innerText = "[003]";
            // Add actual Laboratory content/canvas here
        }

        // Kieran's Zoom Clamp
        let scale = 1;
        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            scale += e.deltaY * -0.01;
            scale = Math.max(1, scale);
            container.style.transform = `scale(${scale})`;
        }, { passive: false });
    </script>
</body>
</html>
