<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VOLE // RECON</title>
    <style>
        :root { --bone: #F5F2EB; --ink: #0F0F0D; --pink: #F48FB1; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; touch-action: none; }
        body { background: var(--bone); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }

        /* THE GATE: No external fetch dependencies */
        #gate {
            position: fixed; inset: 0; z-index: 5000;
            background-color: var(--bone);
            background-image: url('https://lh3.googleusercontent.com/d/1X5X8vVj1S8j_T_P3_B0q5-D9_zX9v_v_'); 
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center;
        }

        .ribbon {
            position: absolute; bottom: 48px; width: 48px; height: 120px;
            background: var(--pink); cursor: pointer;
        }

        .version {
            position: absolute; bottom: 12px; right: 12px; 
            font-size: 9px; color: var(--ink); opacity: 0.4;
        }

        #bridge {
            position: fixed; inset: 0; z-index: 6000;
            background: var(--bone); display: none;
            justify-content: center; align-items: center;
            font-size: 80px; font-weight: 900; color: var(--ink);
        }

        #lab { position: fixed; inset: 0; z-index: 1000; opacity: 0; visibility: hidden; }
        .canvas-container { display: flex; width: 100vw; height: 100vh; background: var(--bone); }
        canvas { width: 100%; height: 100%; touch-action: none; }
        .on { opacity: 1 !important; visibility: visible !important; }
    </style>
</head>
<body>

    <div id="gate">
        <div class="ribbon" onclick="ignite()"></div>
        <div class="version">V.0.6 // RECON</div>
    </div>

    <div id="bridge">//|</div>

    <div id="lab">
        <div class="canvas-container"><canvas id="cvs"></canvas></div>
    </div>

    <script>
        function ignite() {
            document.getElementById('gate').style.opacity = '0';
            document.getElementById('bridge').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('bridge').style.display = 'none';
                document.getElementById('gate').style.display = 'none';
                document.getElementById('lab').classList.add('on');
                init();
            }, 1200);
        }

        function init() {
            const c = document.getElementById('cvs');
            const ctx = c.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            c.width = window.innerWidth * dpr;
            c.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);

            let drawing = false;
            c.onpointerdown = (e) => { if(e.pointerType === 'pen') { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); } };
            c.onpointermove = (e) => { if(drawing) { ctx.strokeStyle = '#0F0F0D'; ctx.lineWidth = 1; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } };
            window.onpointerup = () => { drawing = false; };
        }
    </script>
</body>
</html>
