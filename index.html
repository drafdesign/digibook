<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DRAF. // VOLE.</title>
    <style>
        :root {
            --bone: #F5F2EB;
            --ink: #0F0F0D;
            --fired: #D4500A;
            --dot: rgba(15,15,13,0.12); /* 3mm Register */
            --transition: 400ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; touch-action: none; }
        
        body { background: var(--ink); font-family: 'Courier New', Courier, monospace; overflow: hidden; }

        /* --- THE PRISTINE SPREAD --- */
        #toc-layer {
            width: 100vw; height: 100vh;
            background: var(--bone); /* No wear engine artifacts here */
            display: grid; grid-template-columns: 1fr 1fr;
            padding: 80px; gap: 100px; position: relative;
            opacity: 1; /* Interior is clinical and bright */
        }

        .grid-bg {
            position: absolute; inset: 0; pointer-events: none;
            background-image: radial-gradient(var(--dot) 0.5px, transparent 0.5px);
            background-size: 11.34px 11.34px; /* Locked 3mm Register */
            z-index: 1;
        }

        /* --- THE RIBBON --- */
        .ribbon {
            position: absolute; top: 0; right: 15%; width: 42px; height: 64px;
            background: var(--fired); z-index: 100; cursor: pointer;
            transition: transform 0.2s ease;
        }
        .ribbon:active { transform: translateY(4px); }

        /* --- LEFT: 2x4 GRID --- */
        .toc-left { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(4, 1fr); gap: 20px; z-index: 10; }
        .cell { 
            border: 1px solid var(--ink); aspect-ratio: 1/1; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: transparent; position: relative; cursor: pointer;
        }
        .cell-new { color: var(--fired); font-weight: 900; font-size: 32px; }
        .cell-label { position: absolute; bottom: 8px; left: 8px; font-size: 8px; letter-spacing: 1px; }

        /* --- RIGHT: THE LEDGER --- */
        .toc-right { 
            z-index: 10; display: flex; flex-direction: column; 
            border-left: 0.5px solid rgba(15,15,13,0.1); padding-left: 60px; 
        }
        .ledger-header { font-size: 11px; font-weight: 900; margin-bottom: 40px; letter-spacing: 3px; display: flex; justify-content: space-between; }
        .ledger-entry { 
            display: flex; justify-content: space-between; padding: 12px 0; 
            border-bottom: 0.5px solid rgba(15,15,13,0.08); font-size: 9px; letter-spacing: 1.5px;
        }
        .ledger-entry b { color: var(--ink); font-weight: 900; }

        .inbox-cell { background: #FCF59B; border: none; font-size: 9px; font-weight: 900; }
    </style>
</head>
<body>

    <main id="toc-layer">
        <div class="grid-bg"></div>
        <div class="ribbon" title="Snap to last edit"></div>

        <div class="toc-left">
            <div class="cell cell-new" id="new-page-trigger">//| <span class="cell-label">NEW_SESSION</span></div>
            <div class="cell"><span class="cell-label">01 // AT_COST</span></div>
            <div class="cell"><span class="cell-label">02 // VOLE_UX</span></div>
            <div class="cell"><span class="cell-label">03 // STRADE_B</span></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell inbox-cell">STICKY_INBOX</div>
        </div>

        <div class="toc-right">
            <div class="ledger-header">
                <span>INDEX_CHRONO</span>
                <span style="color:var(--fired)">VOL_01</span>
            </div>
            <div id="ledger-list">
                </div>
        </div>
    </main>

    <script>
        const trigger = document.getElementById('new-page-trigger');
        const ledger = document.getElementById('ledger-list');

        trigger.addEventListener('pointerdown', () => {
            const now = new Date();
            const dateStr = now.toISOString().split('T')[0].replace(/-/g, '');
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            
            const entry = document.createElement('div');
            entry.className = 'ledger-entry';
            entry.innerHTML = `<span>[${dateStr}] ${timeStr}</span> <b>AUTOSPY_INIT</b>`;
            ledger.appendChild(entry);
        });
    </script>
</body>
</html>
