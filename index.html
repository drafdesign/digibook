<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOLE V2.01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { font-family: 'Space Mono', monospace; background-color: #E3DAC9; color: #1A1A1A; overflow: hidden; }
        .dot-grid { background-image: radial-gradient(#4A4A4A26 1px, transparent 0); background-size: 24px 24px; }
        .shutter-zoom { animation: zoom 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        @keyframes zoom { from { transform: translate(-50%, -50%) scale(0); opacity: 1; } to { transform: translate(-50%, -50%) scale(100); opacity: 0; } }
    </style>
</head>
<body>
    <div id="app" class="fixed inset-0 flex flex-col select-none">
        <div id="cover" class="absolute inset-0 z-[100] bg-black cursor-pointer flex items-center justify-center" onclick="startShutter(event)">
            <img src="cover.png" class="min-w-full min-h-full object-cover">
        </div>
        <div id="shutter" class="fixed z-[101] text-9xl font-bold pointer-events-none hidden text-black" style="transform: translate(-50%, -50%); tracking-tighter;">//|</div>
        <main id="workspace" class="relative flex-grow hidden">
            <div id="toc" class="hidden grid grid-cols-2 w-full h-full p-16 gap-16">
                <div class="grid grid-cols-2 grid-rows-4 gap-4">
                    <div onclick="openPage(2)" class="border border-black flex items-center justify-center text-2xl font-bold cursor-pointer hover:bg-black/5 transition-colors">//|</div>
                    <div class="border border-black/10 bg-black/5 flex items-center justify-center text-[10px] opacity-30 italic">RECENT_1</div>
                    <div class="border border-black/10 bg-black/5 flex items-center justify-center text-[10px] opacity-30 italic">RECENT_2</div>
                    <div class="border border-black/10 bg-black/5 flex items-center justify-center text-[10px] opacity-30 italic">RECENT_3</div>
                    <div class="border border-black/10 bg-black/5 flex items-center justify-center text-[10px] opacity-30 italic">RECENT_4</div>
                    <div class="border border-black/10 bg-black/5 flex items-center justify-center text-[10px] opacity-30 italic">RECENT_5</div>
                    <div class="border border-black/10 bg-black/5 flex items-center justify-center text-[10px] opacity-30 italic">RECENT_6</div>
                    <div class="border border-black/10 border-dashed flex items-center justify-center text-[10px] opacity-20 italic">INBOX</div>
                </div>
                <div class="flex flex-col gap-2 overflow-y-auto pr-4">
                    <div class="border-b border-black/10 py-3 flex justify-between text-[11px] font-bold"><span>[VOLE-BHRONGS-PDLETX-P002]</span><span class="opacity-40">MOD_NOW</span></div>
                </div>
            </div>
            <div id="canvas" class="hidden w-full h-full dot-grid relative">
                <div class="absolute top-8 left-8 text-[10px] opacity-40">[002]</div>
                <div class="absolute top-8 right-8 text-[10px] opacity-40">[004]</div>
            </div>
        </main>
        <footer id="hud" class="h-24 w-full flex flex-col justify-end p-6 hidden">
            <div id="dock" class="absolute bottom-28 left-6 w-56 bg-white/90 backdrop-blur-md border border-black p-4 shadow-2xl">
                <div class="grid grid-cols-4 gap-2 mb-3">
                    <div class="aspect-square border border-black/20"></div><div class="aspect-square border border-black/20"></div><div class="aspect-square border border-black/20"></div>
                    <div class="aspect-square border border-black bg-black/10 flex items-center justify-center text-[8px]">▼</div>
                </div>
                <div class="grid grid-cols-5 gap-2">
                    <div class="aspect-square rounded-full border border-black bg-[#1A1A1A]"></div>
                    <div class="aspect-square rounded-full border border-black bg-[#D32F2F]"></div>
                    <div class="aspect-square rounded-full border border-black bg-[#2962FF]"></div>
                    <div class="aspect-square rounded-full border border-black bg-[#E3DAC9]"></div>
                    <div class="aspect-square rounded-full border border-black bg-[#FFB6C1]"></div>
                </div>
                <div class="mt-4 flex justify-end">
                    <div onclick="toggleTriage()" id="triage-btn" class="w-10 h-10 flex items-center justify-center border border-black cursor-pointer">
                        <div id="triage-icon" class="w-5 h-5 rounded-full bg-black"></div>
                    </div>
                </div>
            </div>
            <div class="flex items-center justify-between w-full h-12 border-t border-black/10 pt-4">
                <div class="flex items-center gap-8">
                    <div onclick="showTOC()" class="text-xl font-bold cursor-pointer hover:opacity-50 transition-opacity">//|</div>
                    <div class="text-[11px] font-bold tracking-tighter">
                        <span class="px-2 border-x border-black/5">[VOLE-BHRONGS-PDLETX-V2.01]</span>
                    </div>
                </div>
                <div class="w-6 h-6 rounded-full border border-black flex items-center justify-center text-[8px] font-bold">O</div>
                <div class="flex items-center gap-8 relative">
                    <div class="flex flex-col gap-1 cursor-pointer">
                        <div class="w-5 h-[1.5px] bg-black"></div><div class="w-5 h-[1.5px] bg-black"></div><div class="w-5 h-[1.5px] bg-black"></div>
                    </div>
                    <div class="w-4 h-12 bg-black absolute -top-14 right-0 shadow-lg"></div>
                </div>
            </div>
        </footer>
    </div>
    <script>
        let currentState = 'Ø';
        function startShutter(e) {
            const s = document.getElementById('shutter');
            s.style.left = e.clientX + 'px';
            s.style.top = e.clientY + 'px';
            s.classList.remove('hidden');
            s.classList.add('shutter-zoom');
            setTimeout(() => {
                document.getElementById('cover').classList.add('hidden');
                document.getElementById('workspace').classList.remove('hidden');
                document.getElementById('hud').classList.remove('hidden');
                showTOC();
            }, 600);
        }
        function showTOC() {
            document.getElementById('canvas').classList.add('hidden');
            document.getElementById('toc').classList.remove('hidden');
        }
        function openPage(num) {
            document.getElementById('toc').classList.add('hidden');
            document.getElementById('canvas').classList.remove('hidden');
        }
        function toggleTriage() {
            const icon = document.getElementById('triage-icon');
            if(currentState === 'Ø') { 
                currentState = 'U'; 
                icon.className = 'w-5 h-5 rounded-full border-2 border-black border-r-transparent rotate-45'; 
            } else if(currentState === 'U') { 
                currentState = 'O'; 
                icon.className = 'w-5 h-5 rounded-full border-2 border-black'; 
            } else { 
                currentState = 'Ø'; 
                icon.className = 'w-5 h-5 rounded-full bg-black'; 
            }
        }
    </script>
</body>
</html>
