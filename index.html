<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DRAF. // VOLE. V2.4 REV-G</title>
    <style>
        :root {
            --bone: #F5F2EB;
            --ink: #0F0F0D;
            --spring-pink: #F48FB1;
            --dot: rgba(15,15,13,0.05);
            --transition: 400ms cubic-bezier(0.4, 0, 0.2, 1);
            --nav-height: 80px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; touch-action: none; }
        body { background: var(--ink); font-family: 'Courier New', Courier, monospace; overflow: hidden; height: 100vh; }

        /* --- COVER --- */
        #screen-cover {
            position: fixed; inset: 0; z-index: 2000; background: var(--bone);
            display: flex; justify-content: center; align-items: center; transition: opacity var(--transition);
        }
        #cover-image { width: 100%; height: 100%; object-fit: contain; }
        .ribbon-cover { 
            position: absolute; bottom: 48px; left: 50%; width: 32px; height: 120px; 
            background: var(--spring-pink); transform: translateX(-50%); z-index: 2100; 
        }

        /* --- UI LAYER --- */
        #ui-layer { position: fixed; inset: 0; z-index: 1000; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        .nav-bar, .footer-bar { height: var(--nav-height); width: 100%; background: var(--bone); pointer-events: auto; display: flex; align-items: center; padding: 0 40px; font-size: 10px; border-bottom: 0.5px solid rgba(0,0,0,0.05); }
        .footer-bar { border-top: 0.5px solid rgba(0,0,0,0.05); justify-content: space-between; }
        .ribbon-gutter { position: absolute; top: 0; bottom: 80px; left: 50%; width: 32px; background: var(--spring-pink); transform: translateX(-50%); }

        /* --- VIEWPORT --- */
        #main-viewport { position: absolute; top: var(--nav-height); bottom: var(--nav-height); left: 0; right: 0; background: var(--bone); overflow: hidden; display: none; }
        #canvas-container { width: 100%; height: 100%; display: grid; grid-template-columns: 1fr 1fr; transform-origin: center; transition: transform 0.2s ease; }
        .page-surface { position: relative; height: 100%; border-right: 1px solid rgba(0,0,0,0.02); }
        .dot-grid { position: absolute; inset: 0; pointer-events: none; background-image: radial-gradient(var(--dot) 0.5px, transparent 0.5px); background-size: 15.1px 15.1px; }

        /* --- PORTRAIT --- */
        @media (orientation: portrait) {
            #canvas-container { grid-template-columns: 1fr; width: 200%; }
            .ribbon-gutter { left: 0; transform: none; width: 16px; bottom: 80px; }
            #canvas-container.show-right { transform: translateX(-50%); }
        }

        .show { display: flex !important; }
        .hide { display: none !important; }
    </style>
</head>
<body>

    <section id="screen-cover" onclick="triggerHandshake()">
        <img id="cover-image" src="https://i.ibb.co/Lz0D79m/ryo-spring.png" alt="Ryo Spring Cover">
        <div class="ribbon-cover"></div>
    </section>

    <div id="threshold" style="position:fixed; inset:0; z-index:3000; background:var(--bone); display:none; justify-content:center; align-items:center; font-size:80px;">//|</div>

    <div id="ui-layer" class="hide">
        <header class="nav-bar">DRAF. // REGISTRY</header>
        <div class="ribbon-gutter"></div>
        <footer class="footer-bar">
            <div class="marker" onclick="togglePage('left')">[882]</div>
            <div style="display:flex; gap:20px;"><span onclick="togglePage('left')">TOC</span><span onclick="togglePage('right')">INDEX</span></div>
            <div class="marker" onclick="togglePage('right')">[883]</div>
        </footer>
    </div>

    <main id="main-viewport">
        <div id="canvas-container">
            <article class="page-surface" id="left-page">
                <div class="dot-grid"></div>
                <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:20px; padding:60px; height:100%;">
                    <div style="border:1px solid var(--ink); display:flex; align-items:center; justify-content:center;">//|</div>
                    <div style="border:1px solid var(--ink);"></div><div style="border:1px solid var(--ink);"></div>
                    <div style="border:1px solid var(--ink);"></div><div style="border:1px solid var(--ink);"></div>
                    <div style="border:1px solid var(--ink);"></div><div style="border:1px solid var(--ink);"></div>
                    <div style="background:#FCF59B; border:none; display:flex; align-items:center; justify-content:center; font-size:10px;">STICKY_INBOX</div>
                </div>
            </article>
            <article class="page-surface" id="right-page">
                <div class="dot-grid"></div>
                <div style="padding:60px; font-size:10px;">
                    <p style="border-bottom:1px solid #ddd; padding:10px 0;">[[20260323]] - [09:15] COVER_RECOVERY_SUCCESS</p>
                    <p style="border-bottom:1px solid #ddd; padding:10px 0;">[[20260323]] - [09:20] RIBBON_STABILITY_LOCKED</p>
                </div>
            </article>
        </div>
    </main>

    <script>
        const cover = document.getElementById('screen-cover');
        const thresh = document.getElementById('threshold');
        const ui = document.getElementById('ui-layer');
        const main = document.getElementById('main-viewport');
        const container = document.getElementById('canvas-container');

        function triggerHandshake() {
            cover.classList.add('hide');
            thresh.style.display = 'flex';
            setTimeout(() => {
                thresh.style.display = 'none';
                ui.classList.add('show');
                main.classList.add('show');
            }, 400);
        }

        function togglePage(side) {
            if (window.innerWidth < window.innerHeight) {
                if (side === 'right') container.classList.add('show-right');
                else container.classList.remove('show-right');
            }
        }

        let scale = 1;
        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            scale = Math.max(1, scale + e.deltaY * -0.01);
            container.style.transform = `scale(${scale})`;
        }, { passive: false });
    </script>
</body>
</html>
